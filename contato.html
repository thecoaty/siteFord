<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logoFord">
            <img src="img/logo-ford-256.png" alt="Logo da Ford">
        </div>

        <nav class="navLinks">
            <a href="index.html">Home</a>
            <a href="lancamentos.html">Lançamentos</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main>
        <section class="conteudo">
            <div class="formulario">
                <form>
                    <h2>Fale conosco</h2>
                    <input type="text" placeholder="NOME*">
                    <input type="email" name="email" placeholder="E-MAIL*">
                    <input type="text" name="" placeholder="TELEFONE*">
                    <select>
                        <option value="elogio">Elogio</option>
                        <option value="reclamação">Reclamação </option>
                        <option value="solicitação">Solicitação</option>
                    </select>
                    <input id="inputMSG" type="text" placeholder="Mensagem">
                    <button>Enviar</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="redesFooter">
            <p>REDES SOCIAIS:</p>
            <a href="https://www.facebook.com/FordBrasil/?locale=pt_BR" target="_blank"><img src="img/facebook.png" alt="Facebook"></a>
            <a href="https://www.youtube.com/fordbrasil" target="_blank"><img src="img/youtube.png" alt="YouTube"></a>
            <a href="https://www.instagram.com/fordbrasil/" target="_blank"><img src="img/instagram.png" alt="Instagram"></a>
        </div>
        <p class="copy">Copyright &copy; 2026 Ford Motor Company.</p>
        <img class="logoFooter" src="img/ford-96.png" alt="Logo da Ford">
    </footer>
